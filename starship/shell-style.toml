# Starship Configuration: Two-Line Nerd Prompt
# Author: It's FOSS
# Created: Sunday 15 March 2026
# Updated: Tuesday 14 April 2026
#
# Color Palette: Catppuccin (Mixed Frappe and Mocha)
# Website: https://catppuccin.com/palette/
#
# Symbol Reference Guide:
# A - 󰫮   K - 󰫸   U - 󰬂
# B - 󰫯   L - 󰫹   V - 󰬃
# C - 󰫰   M - 󱎥   W - 󰬄
# D - 󰫱   N - 󰫻   X - 󰬅
# E - 󰫲   O - 󰫼   Y - 󰬆
# F - 󰫳   P - 󰫽   Z - 󰬇
# G - 󰫴   Q - 󰫾
# H - 󰫵   R - 󰫿
# I - 󰫶   S - 󰬀
# J - 󰫷   T - 󰬁

"$schema" = 'https://starship.rs/config-schema.json'

# --- Prompt Layout ---
format = """
[$shell](peach)\
$username\
[󰫶󰫻 ](text)\
$directory\
$c\
$cpp\
$dart\
$golang\
$lua\
$python\
$rust\
${custom.md}\
$git_branch\
$git_status\
$sudo\
$character\
"""

# --- Global Configuration ---
add_newline  = true
palette      = 'catppuccin'
scan_timeout = 100

# --- Color Palettes ---
[palettes.catppuccin]
rosewater = '#dc8a78'
flamingo  = '#dd7878'
pink      = '#ea76cb'
mauve     = '#8839ef'
red       = '#ed8796'
maroon    = '#ee99a0'
peach     = '#f5a97f'
yellow    = '#eed49f'
green     = '#a6da95'
teal      = '#8bd5ca'
sky       = '#91d7e3'
saphire   = '#7dc4e4'
blue      = '#8aadf4'
lavendar  = '#b7bdf8'
text      = '#cad3f5'
subtext1  = '#b8c0e0'
subtext0  = '#a5adcb'
overlay2  = '#939ab7'
overlay1  = '#8087a2'
overlay0  = '#6e738d'
surface2  = '#5b6078'
surface1  = '#494d64'
surface0  = '#363a4f'
base      = '#24273a'
mantle    = '#1e2030'
crust     = '#181926'

# --- Core Modules ---
[username]
show_always = true
style_user  = 'yellow bold'
style_root  = 'red bold'
format      = '[$user]($style) '
disabled    = false
# aliases   = {"itsfoss" = "󰫶󰬁󰬀󰫳󰫼󰬀󰬀"}

[hostname]
ssh_only = false
format   = '[$ssh_symbol](bold blue) on [$hostname](bold red) '
trim_at  = '.companyname.com'
disabled = false

[directory]
truncation_length   = 2
truncation_symbol   = ''
read_only           = ''
home_symbol         = '󰜥'
read_only_style     = 'fg:yellow'
format              = '[$path]($style)[$read_only ]($read_only_style) '

[character]
success_symbol = '[](bold green) '
error_symbol   = '[✗](bold red) '

# --- Version Control ---
[git_branch]
symbol            = '🌱 '
truncation_length = 6
truncation_symbol = ''
style             = 'bold mauve'
format            = '󰫼󰫻 [$symbol$branch(:$remote_branch)]($style) '

[git_status]
ahead       = '[\($count\)](green)[󰫮󰫵󰫱](green)'
conflicted  = '󰫰󰫼󰫻󰫳'
behind      = '󰫯󰫲󰫵󰫻󰫱'
diverged    = '󰫱󰫶󰬃'
up_to_date  = '󰬂󰫽'
untracked   = '[\($count\)](maroon)[󰬂󰫻󰬁󰫿0󰫸󰫱](maroon)'
stashed     = '󰬀󰬁󰬀󰫵󰫱'
modified    = '󱎥󰫼󰫱'
staged      = '󰬀󰬁󰫴󰫱'
renamed     = '󰫿󰫲󰫻󰫮󱎥'
deleted     = '󰫱󰫲󰫹'
typechanged = '󰬁󰬆󰫽󰫲󰫰󰫵'
style       = "fg:teal"
format      = '[$all_status $ahead_behind ]($style)'
disabled    = false

# --- Language Modules ---
[c]
style  = 'fg:blue'
format = 'via [ $version ]($style)'

[cpp]
style    = 'fg:green'
format   = '[via](fg:maroon) [ $version ]($style)'
disabled = false

[dart]
format = '[via](fg:peach) [󰫱󰫮󰫿󰬁 $version ](bold red) '

[golang]
format = '[via](fg:green) [󰫴󰫼 $version ](bold sky) '

[lua]
format = '[via](fg:yellow) [󰫹󰬂󰫮 $version ](bold blue) '

[python]
symbol = '󰫽󰬆 '

[rust]
format = 'via [󰫿󰬂󱎤󰬁 $version ](red bold)'

# --- Shell & System ---
[shell]
fish_indicator    = '󰫳󰫶󱎤󰫵 '
zsh_indicator     = '󰬇󱎤󰫵 '
bash_indicator    = '󰫯󰫮󱎤󰫵 '
unknown_indicator = 'mystery shell '
style             = 'cyan bold'
disabled          = false

[sudo]
symbol   = '󰬂 '
style    = 'bold yellow'
disabled = false

# --- Custom Modules ---
[custom.md]
symbol = "󰫺"
when   = "find . -maxdepth 1 -name '*.md' | grep -q ."
style  = "bold cyan"
format = "[$symbol ]($style)"
